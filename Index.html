<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarea15y17012426 - Puro Dulce</title>
    <!-- Inyección dinámica del Manifest para la PWA -->
    <link rel="manifest" id="dynamic-manifest">
    <meta name="theme-color" content="#b45309">
    
    <!-- Tailwind CSS para diseño adaptable y avanzado -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* CSS3 Avanzado para transiciones y efectos */
        .hover-lift {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
        }
        .hover-lift:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }
        .gradient-text {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Fondo sutil con foto representativa de cristales de azúcar */
        body {
            background-image: linear-gradient(rgba(254, 243, 199, 0.9), rgba(254, 243, 199, 0.95)), url('https://images.unsplash.com/photo-1581798459219-318e76aecc7b?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }
    </style>
</head>
<body class="font-sans text-amber-950 antialiased min-h-screen flex flex-col">

    <!-- Sección C: Identidad y Bienvenida -->
    <header class="bg-amber-700 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between">
            <div class="flex items-center space-x-4">
                <!-- Logotipo / Silueta de usuario estilizada (h.i) -->
                <div class="w-16 h-16 rounded-full border-2 border-amber-300 bg-amber-600/50 flex items-center justify-center shadow-md overflow-hidden shrink-0">
                    <svg class="w-10 h-10 text-amber-100" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-sm text-amber-200 font-mono tracking-widest">Proyecto: Tarea15y17012426</h1>
                    <h2 class="text-2xl font-bold">Puro Dulce</h2>
                    <p class="text-xs text-amber-100 italic">Cristales de azúcar</p>
                </div>
            </div>
            
            <div class="mt-4 md:mt-0 flex items-center space-x-4">
                <!-- Botón de Texto a Voz (c.i) -->
                <button id="ttsBtn" class="bg-amber-500 hover:bg-amber-400 text-white px-5 py-2 rounded-full font-semibold transition shadow-md flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                    Escuchar Eslogan
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8 space-y-12">
        
        <!-- Sección D: Comercio e Interacción Dinámica -->
        <section class="bg-white/80 backdrop-blur-md rounded-3xl p-8 shadow-xl border border-amber-100">
            <h3 class="text-3xl font-extrabold text-amber-900 mb-6 border-b-2 border-amber-200 inline-block pb-2">Catálogo de Cristales</h3>
            
            <!-- i. Catálogo Interactivo -->
            <div id="catalog-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-10">
                <!-- El catálogo se renderiza con JavaScript -->
            </div>

            <!-- ii. Formulario de Pedidos/Reseñas -->
            <div class="bg-amber-50 rounded-2xl p-6 border border-amber-100">
                <h4 class="text-xl font-bold text-amber-800 mb-4">Realizar Pedido o Reseña</h4>
                <form id="orderForm" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-amber-900 mb-1">Nombre Completo</label>
                            <input type="text" id="formName" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-amber-500 outline-none transition" placeholder="Ej. Juan Pérez">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-amber-900 mb-1">Correo Electrónico</label>
                            <input type="email" id="formEmail" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-amber-500 outline-none transition" placeholder="correo@ejemplo.com">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-amber-900 mb-1">Comentarios o Reseña</label>
                        <textarea id="formNotes" rows="3" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-amber-500 outline-none transition" placeholder="Escriba aquí sus comentarios..."></textarea>
                    </div>
                    <button type="submit" class="bg-amber-600 hover:bg-amber-700 text-white font-bold py-3 px-6 rounded-lg w-full transition shadow-md">
                        Enviar Información
                    </button>
                </form>
            </div>
        </section>

        <!-- Sección E: Canales y Multimedia -->
        <section class="bg-white/80 backdrop-blur-md rounded-3xl p-8 shadow-xl border border-amber-100 text-center">
            <h3 class="text-3xl font-extrabold text-amber-900 mb-8">Nuestros Canales</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                
                <!-- Enlaces con Hover CSS3 Moderno -->
                <a href="https://jorgemejicanos.wixsite.com/endulsante-natural" target="_blank" class="hover-lift bg-amber-600 text-white p-4 rounded-xl shadow-lg flex items-center justify-center font-bold">
                    <span class="mr-2">🌐</span> Sitio Web Oficial (Wix)
                </a>
                
                <a href="https://www.youtube.com/watch?v=BaaUbPSaZFo" target="_blank" class="hover-lift bg-red-600 text-white p-4 rounded-xl shadow-lg flex items-center justify-center font-bold">
                    <span class="mr-2">▶️</span> Video YouTube
                </a>

                <div class="col-span-1 md:col-span-2 lg:col-span-2 grid grid-cols-2 gap-4">
                    <a href="#" class="hover-lift bg-pink-600 text-white p-4 rounded-xl shadow-lg flex items-center justify-center font-bold">Instagram</a>
                    <a href="#" class="hover-lift bg-blue-800 text-white p-4 rounded-xl shadow-lg flex items-center justify-center font-bold">Facebook</a>
                    <a href="#" class="hover-lift bg-black text-white p-4 rounded-xl shadow-lg flex items-center justify-center font-bold">TikTok</a>
                    <a href="#" class="hover-lift bg-blue-400 text-white p-4 rounded-xl shadow-lg flex items-center justify-center font-bold">Twitter/X</a>
                </div>

                <!-- Enlace Universidad Galileo con Logo -->
                <a href="https://www.galileo.edu/" target="_blank" class="hover-lift bg-white text-gray-800 border-2 border-orange-500 p-4 rounded-xl shadow-lg flex items-center justify-center font-bold col-span-1 md:col-span-2 lg:col-span-4 mt-4">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/2/29/Logotipo_Universidad_Galileo.png" alt="Logo de la Universidad Galileo" class="h-8 mr-3 object-contain" onerror="this.src='https://via.placeholder.com/100x30?text=U.+Galileo'">
                    Visitar Universidad Galileo
                </a>
            </div>
        </section>

        <!-- Sección F: Navegación y Cierre -->
        <section class="bg-amber-950 text-white rounded-3xl p-8 shadow-xl flex flex-col md:flex-row items-center justify-between">
            <div class="text-center md:text-left mb-6 md:mb-0">
                <h3 class="text-xl font-bold mb-2 text-amber-300">Firma de Autoría</h3>
                <!-- ii. Elemento Canvas -->
                <div class="bg-amber-900/50 rounded-lg p-2 inline-block">
                    <canvas id="signatureCanvas" width="300" height="80"></canvas>
                </div>
            </div>
            
            <!-- i. Botón de Salir -->
            <button id="exitBtn" class="bg-red-500 hover:bg-red-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition transform hover:scale-105 flex items-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                Cerrar Sesión
            </button>
        </section>
    </main>

    <!-- Modal Personalizado (Reemplazo de alert()) -->
    <div id="customModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[100] hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full mx-4 transform scale-95 transition-transform duration-300" id="modalContent">
            <h3 id="modalTitle" class="text-2xl font-bold text-amber-800 mb-2">Mensaje</h3>
            <p id="modalMessage" class="text-gray-600 mb-6">Contenido del mensaje.</p>
            <button id="closeModalBtn" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-2 px-4 rounded-lg transition">
                Entendido
            </button>
        </div>
    </div>

    <!-- Lógica de la Aplicación -->
    <script>
        // --- SECCIÓN G: CONFIGURACIÓN PWA (Técnica de un solo archivo mediante Blobs) ---
        // 1. Generar Manifest dinámico
        const manifestData = {
            "name": "Puro Dulce App - Tarea15y17012426",
            "short_name": "Puro Dulce",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#fef3c7",
            "theme_color": "#b45309",
            "description": "Aplicación oficial de Puro Dulce para la tarea 15.",
            "icons": [
                {
                    "src": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0MCIgZmlsbD0iI2I0NTMwOSIvPjwvc3ZnPg==",
                    "sizes": "192x192",
                    "type": "image/svg+xml"
                }
            ]
        };
        const manifestBlob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
        document.getElementById('dynamic-manifest').href = URL.createObjectURL(manifestBlob);

        // 2. Generar y Registrar Service Worker dinámico
        const swCode = `
            const CACHE_NAME = 'purodulce-v1';
            self.addEventListener('install', event => {
                event.waitUntil(self.skipWaiting());
            });
            self.addEventListener('activate', event => {
                event.waitUntil(self.clients.claim());
            });
            self.addEventListener('fetch', event => {
                event.respondWith(
                    fetch(event.request).catch(() => new Response('App Offline'))
                );
            });
        `;
        const swBlob = new Blob([swCode], {type: 'application/javascript'});
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register(URL.createObjectURL(swBlob))
                    .then(reg => console.log('Service Worker de Puro Dulce registrado.'))
                    .catch(err => console.log('PWA SW restringido por contexto de seguridad en iframe.'));
            });
        }

        // --- LÓGICA DE INTERFAZ Y COMPONENTES ---

        // Función Modal (Reemplaza alert())
        const modal = document.getElementById('customModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');
        const modalContent = document.getElementById('modalContent');
        
        function showModal(title, msg, isError = false) {
            modalTitle.textContent = title;
            modalMessage.textContent = msg;
            modalTitle.className = isError ? 'text-2xl font-bold text-red-600 mb-2' : 'text-2xl font-bold text-amber-800 mb-2';
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        document.getElementById('closeModalBtn').addEventListener('click', () => {
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        });

        // c.i: Web Speech API (Texto a Voz adaptado a Puro Dulce)
        document.getElementById('ttsBtn').addEventListener('click', () => {
            const mensaje = "Puro Dulce, cristales de azúcar. Nuestro objetivo principal es endulzar cada uno de tus momentos especiales con la mayor pureza, textura crujiente y calidad artesanal 100 por ciento natural.";
            
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(mensaje);
                utterance.lang = 'es-ES';
                utterance.rate = 1.0;
                utterance.pitch = 1.1;
                window.speechSynthesis.speak(utterance);
                
                showModal('Reproduciendo audio', 'El eslogan de Puro Dulce está siendo narrado mediante inteligencia artificial.');
            } else {
                showModal('Error', 'Su navegador no soporta la API de síntesis de voz.', true);
            }
        });

        // d.i: Catálogo Dinámico de Productos (Adaptado a cristales de azúcar)
        const productos = [
            { id: 1, nombre: 'Cristales de Azúcar Premium 500g', ingredientes: '100% Extracto de caña de azúcar cristalizado, sin aditivos.', precio: 'Q 35.00', img: 'image_15328d.png' },
            { id: 2, nombre: 'Puro Dulce Moreno 1kg', ingredientes: 'Cristales de azúcar morena con melaza natural de alta pureza.', precio: 'Q 55.00', img: 'image_151f68.jpg' },
            { id: 3, nombre: 'Mini Cristales Candy (Pack 10)', ingredientes: 'Porciones individuales de cristales saborizados con frutos del bosque.', precio: 'Q 40.00', img: 'image_152365.png' }
        ];

        const catalogContainer = document.getElementById('catalog-container');
        productos.forEach(prod => {
            const card = document.createElement('div');
            card.className = 'bg-white rounded-2xl overflow-hidden shadow-lg hover:shadow-2xl transition transform hover:-translate-y-1';
            card.innerHTML = `
                <div class="h-48 overflow-hidden">
                    <img src="${prod.img}" alt="${prod.nombre}" class="w-full h-full object-cover transition duration-500 hover:scale-110">
                </div>
                <div class="p-5">
                    <h4 class="text-xl font-bold text-amber-900 mb-1">${prod.nombre}</h4>
                    <p class="text-xs text-amber-600 font-semibold mb-3">Cristales de azúcar seleccionados</p>
                    <p class="text-sm text-gray-600 mb-4"><span class="font-bold">Ingredientes:</span> ${prod.ingredientes}</p>
                    <div class="flex justify-between items-center mt-4">
                        <span class="text-2xl font-black text-amber-700">${prod.precio}</span>
                        <button class="bg-amber-100 text-amber-900 hover:bg-amber-200 px-3 py-1 rounded-full text-sm font-bold transition" onclick="document.getElementById('formNotes').value='Me interesa adquirir: ${prod.nombre}'; document.getElementById('formName').focus();">
                            + Seleccionar
                        </button>
                    </div>
                </div>
            `;
            catalogContainer.appendChild(card);
        });

        // d.ii: Validación de Formulario con JS
        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('formName').value.trim();
            const email = document.getElementById('formEmail').value.trim();
            
            if(name === '' || email === '') {
                showModal('Campos Incompletos', 'Por favor, ingrese su nombre y correo electrónico antes de procesar su solicitud de Puro Dulce.', true);
                return;
            }
            
            if(!email.includes('@') || !email.includes('.')) {
                showModal('Correo Inválido', 'Por favor, ingrese un correo electrónico válido.', true);
                return;
            }

            showModal('¡Pedido Recibido!', `Gracias ${name}, hemos registrado su solicitud de Puro Dulce correctamente. Le enviaremos los detalles de sus Cristales de azúcar al correo ${email}.`);
            this.reset();
        });

        // f.ii: Animación Canvas del Apellido (Morales)
        const canvas = document.getElementById('signatureCanvas');
        const ctx = canvas.getContext('2d');
        let offset = 0;
        const apellido = "Morales";

        function animateSignature() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'italic bold 48px "Times New Roman", serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Crear degradado dinámico en tonos caramelo/dorado/ámbar
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
            gradient.addColorStop(0, `hsl(${offset % 60 + 20}, 90%, 50%)`); // Rango cálido dorado
            gradient.addColorStop(0.5, `hsl(${(offset + 30) % 60 + 20}, 90%, 65%)`);
            gradient.addColorStop(1, `hsl(${(offset + 60) % 60 + 20}, 90%, 50%)`);

            ctx.fillStyle = gradient;
            ctx.shadowColor = 'rgba(245, 158, 11, 0.5)';
            ctx.shadowBlur = 12;
            
            ctx.fillText(apellido, canvas.width / 2, canvas.height / 2);

            offset += 1;
            requestAnimationFrame(animateSignature);
        }
        animateSignature();

        // f.i: Botón de Salir (Cierre de sesión simulado)
        document.getElementById('exitBtn').addEventListener('click', () => {
            showModal('Cerrando sesión', 'Desconectando de Puro Dulce...');
            setTimeout(() => {
                document.body.innerHTML = `
                    <div class="flex items-center justify-center min-h-screen bg-amber-950 text-white text-center p-4">
                        <div>
                            <svg class="w-24 h-24 mx-auto mb-6 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <h1 class="text-4xl font-bold mb-4">Sesión Cerrada</h1>
                            <p class="text-amber-200">¡Gracias por preferir Puro Dulce!</p>
                            <button onclick="location.reload()" class="mt-8 bg-amber-600 hover:bg-amber-500 px-6 py-2 rounded-lg font-bold transition">Volver a ingresar</button>
                        </div>
                    </div>
                `;
            }, 1500);
        });
    </script>
</body>
</html>
